<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>لوحة تحكم أبو فيصل</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: #0a0a0a; color: white; padding: 20px; padding-top: env(safe-area-inset-top); }
        .card { background: #151515; border-radius: 20px; padding: 20px; border: 1px solid #333; margin-top: 20px; }
        h1 { text-align: center; color: #ff3333; margin-bottom: 20px; }
        input, select { width: 100%; padding: 15px; margin-bottom: 10px; background: #000; border: 1px solid #444; color: white; border-radius: 12px; }
        .btn { width: 100%; padding: 15px; background: #e60000; border: none; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; }
        #dashboard { display: none; }
    </style>
</head>
<body>

    <div id="loginBox">
        <h1>🔐 دخول الإدمن</h1>
        <input type="text" id="user" placeholder="اسم المستخدم" value="admin">
        <input type="password" id="pass" placeholder="كلمة المرور" value="admin123">
        <button class="btn" id="loginBtn">دخول</button>
    </div>

    <div id="dashboard">
        <h1>🎮 لوحة التحكم</h1>
        <div class="card">
            <h3>إضافة سؤال جديد</h3>
            <input type="text" id="q" placeholder="السؤال">
            <input type="text" id="a" placeholder="خيار 1">
            <input type="text" id="b" placeholder="خيار 2">
            <input type="text" id="c" placeholder="خيار 3">
            <input type="text" id="d" placeholder="خيار 4">
            <select id="correct">
                <option value="0">الإجابة: خيار 1</option>
                <option value="1">الإجابة: خيار 2</option>
                <option value="2">الإجابة: خيار 3</option>
                <option value="3">الإجابة: خيار 4</option>
            </select>
            <button class="btn" id="addBtn">حفظ السؤال</button>
        </div>
    </div>

<script type="module">
    // استدعاء Firebase بنظام الوحدات (أسرع وأضمن للأيفون)
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.10.0/firebase-app.js";
    import { getDatabase, ref, push, set } from "https://www.gstatic.com/firebasejs/9.10.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBKs24sqojKX51Q4HAPv3amY1oTGo3YcyA",
        authDomain: "myquiz-314f9.firebaseapp.com",
        databaseURL: "https://myquiz-314f9-default-rtdb.firebaseio.com",
        projectId: "myquiz-314f9",
        storageBucket: "myquiz-314f9.firebasestorage.app",
        messagingSenderId: "86590365416",
        appId: "1:86590365416:web:0d37b3695ec028103ff35d"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // منطق الدخول
    document.getElementById('loginBtn').onclick = () => {
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;
        if(u === 'admin' && p === 'admin123') {
            document.getElementById('loginBox').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
        } else {
            alert('خطأ في البيانات');
        }
    };

    // إضافة سؤال
    document.getElementById('addBtn').onclick = async () => {
        const question = document.getElementById('q').value;
        const opts = [
            document.getElementById('a').value,
            document.getElementById('b').value,
            document.getElementById('c').value,
            document.getElementById('d').value
        ];
        const correctIdx = document.getElementById('correct').value;

        if(!question || !opts[0]) return alert('أكمل البيانات');

        try {
            await push(ref(db, 'questions'), {
                q: question,
                opts: opts,
                ans: opts[correctIdx],
                time: Date.now()
            });
            alert('✅ تم الحفظ بنجاح');
            document.getElementById('q').value = "";
        } catch (e) {
            alert('فشل الحفظ: ' + e.message);
        }
    };
</script>
</body>
</html>
