<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>🎯 لوحة التحكم · 5000 لغز عربي</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { background: #0a0a0a; font-family: 'Cairo', sans-serif; color: white; min-height: 100vh; padding: 16px; }
    .admin-container { max-width: 1200px; margin: 0 auto; }
    
    /* شاشة تسجيل الدخول */
    .login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-card { background: #151515; border-radius: 32px; padding: 40px 30px; border: 1px solid #ff3333; max-width: 400px; width: 100%; text-align: center; box-shadow: 0 0 50px rgba(255,0,0,0.2); }
    .login-card h1 { font-size: 32px; font-weight: 900; background: linear-gradient(135deg, #ff6b6b, #ff1a1a); -webkit-background-clip: text; background-clip: text; color: transparent; margin-bottom: 30px; }
    .login-input { width: 100%; padding: 16px 18px; background: #0a0a0a; border: 2px solid #333; border-radius: 16px; color: white; font-size: 16px; margin-bottom: 16px; font-family: 'Cairo', sans-serif; }
    .login-input:focus { border-color: #ff4444; outline: none; }
    .login-btn { width: 100%; padding: 16px; background: #e60000; border: none; border-radius: 16px; color: white; font-size: 18px; font-weight: 700; cursor: pointer; font-family: 'Cairo', sans-serif; }
    .login-error { color: #ff4444; margin-top: 16px; font-size: 14px; }
    
    /* لوحة التحكم الرئيسية */
    .dashboard-screen { display: none; }
    .dashboard-screen.active { display: block; }
    
    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 16px; }
    .header h1 { font-size: 28px; font-weight: 900; background: linear-gradient(135deg, #ff6b6b, #ff1a1a); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .header-actions { display: flex; gap: 12px; }
    
    .btn { padding: 12px 20px; border-radius: 14px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: 'Cairo', sans-serif; border: none; transition: all 0.2s; }
    .btn-primary { background: #e60000; color: white; }
    .btn-secondary { background: #222; color: white; border: 1px solid #444; }
    .btn-danger { background: #550000; color: #ff9999; border: 1px solid #ff4444; }
    .btn-success { background: #006600; color: white; }
    .btn:active { transform: scale(0.98); }
    
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .stat-card { background: #151515; border-radius: 20px; padding: 20px; border: 1px solid #2a2a2a; text-align: center; }
    .stat-value { font-size: 36px; font-weight: 900; color: #ff4444; }
    .stat-label { color: #aaa; font-size: 14px; margin-top: 8px; }
    
    .section-title { font-size: 20px; font-weight: 700; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }
    .card { background: #151515; border-radius: 24px; padding: 24px; border: 1px solid #2a2a2a; margin-bottom: 24px; }
    
    /* نموذج إضافة سؤال */
    .form-grid { display: grid; grid-template-columns: 1fr; gap: 16px; }
    @media (min-width: 768px) { .form-grid { grid-template-columns: 1fr 1fr; } }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; color: #aaa; margin-bottom: 8px; font-size: 14px; }
    .form-group input, .form-group select { width: 100%; padding: 14px 16px; background: #0a0a0a; border: 1px solid #333; border-radius: 14px; color: white; font-size: 15px; font-family: 'Cairo', sans-serif; }
    .form-group input:focus, .form-group select:focus { border-color: #ff4444; outline: none; }
    .full-width { grid-column: 1 / -1; }
    
    /* جدول الأسئلة */
    .table-container { overflow-x: auto; max-height: 500px; overflow-y: auto; }
    .questions-table { width: 100%; border-collapse: collapse; font-size: 14px; }
    .questions-table th { background: #1a1a1a; padding: 14px 12px; text-align: right; color: #ff9999; font-weight: 700; position: sticky; top: 0; }
    .questions-table td { padding: 12px; border-bottom: 1px solid #2a2a2a; }
    .questions-table tr:hover { background: #1a1a1a; }
    .action-buttons { display: flex; gap: 8px; }
    .icon-btn { background: none; border: none; color: #aaa; cursor: pointer; font-size: 18px; padding: 4px 8px; }
    .icon-btn.edit:hover { color: #ffaa00; }
    .icon-btn.delete:hover { color: #ff4444; }
    
    /* إعدادات اللعبة */
    .settings-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
    .slider-item label { display: flex; justify-content: space-between; margin-bottom: 8px; }
    input[type="range"] { width: 100%; accent-color: #ff1a1a; }
    
    /* مودال التعديل */
    .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; padding: 16px; }
    .modal.active { display: flex; }
    .modal-content { background: #151515; border-radius: 24px; padding: 24px; max-width: 500px; width: 100%; border: 1px solid #ff3333; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .modal-title { font-size: 20px; font-weight: 700; }
    .close-btn { background: none; border: none; color: #aaa; font-size: 24px; cursor: pointer; }
    
    .toast { position: fixed; bottom: 20px; right: 20px; background: #333; padding: 12px 20px; border-radius: 12px; color: white; z-index: 2000; animation: slideIn 0.3s; }
    .toast.success { background: #006600; }
    .toast.error { background: #8b0000; }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  </style>
</head>
<body>
<div class="admin-container">
  <!-- شاشة تسجيل الدخول -->
  <div class="login-screen" id="loginScreen">
    <div class="login-card">
      <h1>🔐 لوحة التحكم</h1>
      <input type="text" id="usernameInput" class="login-input" placeholder="اسم المستخدم" value="admin">
      <input type="password" id="passwordInput" class="login-input" placeholder="كلمة المرور" value="admin123">
      <button class="login-btn" onclick="login()">دخول</button>
      <div class="login-error" id="loginError"></div>
    </div>
  </div>

  <!-- لوحة التحكم الرئيسية -->
  <div class="dashboard-screen" id="dashboardScreen">
    <div class="header">
      <h1>🎮 لوحة تحكم المسؤول</h1>
      <div class="header-actions">
        <button class="btn btn-danger" onclick="resetGame()">🔄 إعادة ضبط اللعبة</button>
        <button class="btn btn-secondary" onclick="logout()">🚪 تسجيل خروج</button>
      </div>
    </div>
    
    <!-- إحصائيات -->
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-value" id="totalQuestions">0</div><div class="stat-label">إجمالي الأسئلة</div></div>
      <div class="stat-card"><div class="stat-value" id="activeRooms">0</div><div class="stat-label">الغرف النشطة</div></div>
      <div class="stat-card"><div class="stat-value" id="onlinePlayers">0</div><div class="stat-label">اللاعبين المتصلين</div></div>
    </div>
    
    <!-- إضافة سؤال جديد -->
    <div class="card">
      <div class="section-title"><span>➕</span> إضافة سؤال جديد</div>
      <div class="form-grid">
        <div class="form-group full-width"><label>السؤال</label><input type="text" id="newQuestion" placeholder="أدخل السؤال..."></div>
        <div class="form-group"><label>الخيار أ</label><input type="text" id="newOptA" placeholder="الخيار الأول"></div>
        <div class="form-group"><label>الخيار ب</label><input type="text" id="newOptB" placeholder="الخيار الثاني"></div>
        <div class="form-group"><label>الخيار ج</label><input type="text" id="newOptC" placeholder="الخيار الثالث"></div>
        <div class="form-group"><label>الخيار د</label><input type="text" id="newOptD" placeholder="الخيار الرابع"></div>
        <div class="form-group"><label>الإجابة الصحيحة</label><select id="newCorrect"><option value="A">أ</option><option value="B">ب</option><option value="C">ج</option><option value="D">د</option></select></div>
        <div class="form-group"><label>التصنيف</label><input type="text" id="newCategory" placeholder="مثال: دينية، رياضة..."></div>
        <div class="form-group full-width"><button class="btn btn-primary" onclick="addQuestion()" style="width:100%;">💾 حفظ السؤال</button></div>
      </div>
    </div>
    
    <!-- إعدادات اللعبة -->
    <div class="card">
      <div class="section-title"><span>⚙️</span> إعدادات اللعبة العامة</div>
      <div class="settings-grid">
        <div class="slider-item"><label>🔴 الجولات الافتراضية <span id="defRoundsVal">10</span></label><input type="range" id="defRoundsSlider" min="5" max="30" value="10"></div>
        <div class="slider-item"><label>⏳ وقت التفكير <span id="defThinkVal">15</span> ث</label><input type="range" id="defThinkSlider" min="5" max="45" value="15"></div>
        <div class="slider-item"><label>🕒 عرض الإجابة <span id="defViewVal">3</span> ث</label><input type="range" id="defViewSlider" min="2" max="10" value="3"></div>
      </div>
      <button class="btn btn-primary" onclick="saveGlobalSettings()" style="margin-top:20px;">💾 حفظ الإعدادات العامة</button>
    </div>
    
    <!-- جدول الأسئلة -->
    <div class="card">
      <div class="section-title"><span>📋</span> إدارة الأسئلة <span style="margin-right:auto; font-size:14px; color:#aaa;">(اسحب للتحديث)</span></div>
      <div class="table-container">
        <table class="questions-table" id="questionsTable">
          <thead><tr><th>السؤال</th><th>أ</th><th>ب</th><th>ج</th><th>د</th><th>الإجابة</th><th>التصنيف</th><th>إجراءات</th></tr></thead>
          <tbody id="questionsTableBody"></tbody>
        </table>
      </div>
    </div>
  </div>
  
  <!-- مودال تعديل السؤال -->
  <div class="modal" id="editModal">
    <div class="modal-content">
      <div class="modal-header"><div class="modal-title">✏️ تعديل السؤال</div><button class="close-btn" onclick="closeEditModal()">&times;</button></div>
      <input type="hidden" id="editQuestionId">
      <div class="form-group"><label>السؤال</label><input type="text" id="editQuestion"></div>
      <div class="form-group"><label>الخيار أ</label><input type="text" id="editOptA"></div>
      <div class="form-group"><label>الخيار ب</label><input type="text" id="editOptB"></div>
      <div class="form-group"><label>الخيار ج</label><input type="text" id="editOptC"></div>
      <div class="form-group"><label>الخيار د</label><input type="text" id="editOptD"></div>
      <div class="form-group"><label>الإجابة الصحيحة</label><select id="editCorrect"><option value="A">أ</option><option value="B">ب</option><option value="C">ج</option><option value="D">د</option></select></div>
      <div class="form-group"><label>التصنيف</label><input type="text" id="editCategory"></div>
      <button class="btn btn-primary" onclick="updateQuestion()" style="width:100%;">💾 حفظ التعديلات</button>
    </div>
  </div>
</div>

<script>
  // ==================== Firebase ====================
  firebase.initializeApp({apiKey:"AIzaSyBKs24sqojKX51Q4HAPv3amY1oTGo3YcyA",authDomain:"myquiz-314f9.firebaseapp.com",databaseURL:"https://myquiz-314f9-default-rtdb.firebaseio.com",projectId:"myquiz-314f9",storageBucket:"myquiz-314f9.firebasestorage.app",messagingSenderId:"86590365416",appId:"1:86590365416:web:0d37b3695ec028103ff35d"});
  const db = firebase.database();
  
  // ==================== إعدادات المسؤول ====================
  const ADMIN_CONFIG = {
    username: 'admin',
    password: 'admin123'
  };
  
  let allQuestions = [];
  
  // ==================== تسجيل الدخول ====================
  window.login = function() {
    const username = document.getElementById('usernameInput').value;
    const password = document.getElementById('passwordInput').value;
    
    if(username === ADMIN_CONFIG.username && password === ADMIN_CONFIG.password) {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('dashboardScreen').classList.add('active');
      localStorage.setItem('adminLoggedIn', 'true');
      loadDashboard();
    } else {
      document.getElementById('loginError').innerText = 'اسم المستخدم أو كلمة المرور غير صحيحة';
    }
  };
  
  window.logout = function() {
    localStorage.removeItem('adminLoggedIn');
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('dashboardScreen').classList.remove('active');
  };
  
  // التحقق من تسجيل الدخول السابق
  if(localStorage.getItem('adminLoggedIn') === 'true') {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('dashboardScreen').classList.add('active');
    loadDashboard();
  }
  
  // ==================== تحميل لوحة التحكم ====================
  function loadDashboard() {
    loadQuestions();
    loadStats();
    loadGlobalSettings();
  }
  
  function loadQuestions() {
    db.ref('questions').on('value', snapshot => {
      allQuestions = [];
      const data = snapshot.val() || {};
      Object.entries(data).forEach(([id, q]) => { allQuestions.push({ id, ...q }); });
      document.getElementById('totalQuestions').innerText = allQuestions.length;
      renderQuestionsTable();
    });
  }
  
  function renderQuestionsTable() {
    const tbody = document.getElementById('questionsTableBody');
    tbody.innerHTML = allQuestions.slice(0, 100).map(q => `
      <tr>
        <td>${q.q?.substring(0, 40)}${q.q?.length > 40 ? '...' : ''}</td>
        <td>${q.opts?.[0] || ''}</td>
        <td>${q.opts?.[1] || ''}</td>
        <td>${q.opts?.[2] || ''}</td>
        <td>${q.opts?.[3] || ''}</td>
        <td>${q.ans || ''}</td>
        <td>${q.cat || ''}</td>
        <td><div class="action-buttons">
          <button class="icon-btn edit" onclick="editQuestion('${q.id}')">✏️</button>
          <button class="icon-btn delete" onclick="deleteQuestion('${q.id}')">🗑️</button>
        </div></td>
      </tr>
    `).join('');
  }
  
  function loadStats() {
    db.ref('rooms').on('value', snapshot => {
      const rooms = snapshot.val() || {};
      const activeRooms = Object.keys(rooms).length;
      let onlinePlayers = 0;
      Object.values(rooms).forEach(room => {
        if(room.players) onlinePlayers += Object.keys(room.players).length;
      });
      document.getElementById('activeRooms').innerText = activeRooms;
      document.getElementById('onlinePlayers').innerText = onlinePlayers;
    });
  }
  
  function loadGlobalSettings() {
    db.ref('settings/global').on('value', snapshot => {
      const settings = snapshot.val() || { defaultRounds: 10, defaultThinkTime: 15, defaultViewTime: 3 };
      document.getElementById('defRoundsSlider').value = settings.defaultRounds;
      document.getElementById('defThinkSlider').value = settings.defaultThinkTime;
      document.getElementById('defViewSlider').value = settings.defaultViewTime;
      document.getElementById('defRoundsVal').innerText = settings.defaultRounds;
      document.getElementById('defThinkVal').innerText = settings.defaultThinkTime;
      document.getElementById('defViewVal').innerText = settings.defaultViewTime;
    });
    
    document.getElementById('defRoundsSlider').oninput = function() { document.getElementById('defRoundsVal').innerText = this.value; };
    document.getElementById('defThinkSlider').oninput = function() { document.getElementById('defThinkVal').innerText = this.value; };
    document.getElementById('defViewSlider').oninput = function() { document.getElementById('defViewVal').innerText = this.value; };
  }
  
  // ==================== إدارة الأسئلة ====================
  window.addQuestion = function() {
    const q = document.getElementById('newQuestion').value.trim();
    const optA = document.getElementById('newOptA').value.trim();
    const optB = document.getElementById('newOptB').value.trim();
    const optC = document.getElementById('newOptC').value.trim();
    const optD = document.getElementById('newOptD').value.trim();
    const correctLetter = document.getElementById('newCorrect').value;
    const category = document.getElementById('newCategory').value.trim() || 'متنوع';
    
    if(!q || !optA || !optB || !optC || !optD) {
      showToast('الرجاء ملء جميع الحقول', 'error');
      return;
    }
    
    const opts = [optA, optB, optC, optD];
    const ans = opts[correctLetter === 'A' ? 0 : correctLetter === 'B' ? 1 : correctLetter === 'C' ? 2 : 3];
    
    const newQuestion = { q, opts, ans, cat: category, createdAt: Date.now() };
    db.ref('questions').push(newQuestion);
    
    document.getElementById('newQuestion').value = '';
    document.getElementById('newOptA').value = '';
    document.getElementById('newOptB').value = '';
    document.getElementById('newOptC').value = '';
    document.getElementById('newOptD').value = '';
    document.getElementById('newCategory').value = '';
    
    showToast('تم إضافة السؤال بنجاح', 'success');
  };
  
  window.editQuestion = function(id) {
    const q = allQuestions.find(q => q.id === id);
    if(!q) return;
    
    document.getElementById('editQuestionId').value = id;
    document.getElementById('editQuestion').value = q.q;
    document.getElementById('editOptA').value = q.opts[0];
    document.getElementById('editOptB').value = q.opts[1];
    document.getElementById('editOptC').value = q.opts[2];
    document.getElementById('editOptD').value = q.opts[3];
    
    const correctIndex = q.opts.indexOf(q.ans);
    document.getElementById('editCorrect').value = correctIndex === 0 ? 'A' : correctIndex === 1 ? 'B' : correctIndex === 2 ? 'C' : 'D';
    document.getElementById('editCategory').value = q.cat;
    
    document.getElementById('editModal').classList.add('active');
  };
  
  window.updateQuestion = function() {
    const id = document.getElementById('editQuestionId').value;
    const q = document.getElementById('editQuestion').value.trim();
    const opts = [
      document.getElementById('editOptA').value.trim(),
      document.getElementById('editOptB').value.trim(),
      document.getElementById('editOptC').value.trim(),
      document.getElementById('editOptD').value.trim()
    ];
    const correctLetter = document.getElementById('editCorrect').value;
    const ans = opts[correctLetter === 'A' ? 0 : correctLetter === 'B' ? 1 : correctLetter === 'C' ? 2 : 3];
    const cat = document.getElementById('editCategory').value.trim();
    
    db.ref(`questions/${id}`).update({ q, opts, ans, cat, updatedAt: Date.now() });
    closeEditModal();
    showToast('تم تحديث السؤال بنجاح', 'success');
  };
  
  window.deleteQuestion = function(id) {
    if(confirm('هل أنت متأكد من حذف هذا السؤال؟')) {
      db.ref(`questions/${id}`).remove();
      showToast('تم حذف السؤال', 'success');
    }
  };
  
  window.closeEditModal = function() {
    document.getElementById('editModal').classList.remove('active');
  };
  
  // ==================== التحكم باللعبة ====================
  window.resetGame = function() {
    if(confirm('هل أنت متأكد من إعادة ضبط اللعبة لجميع اللاعبين؟ سيتم إعادة الجميع إلى اللوبي.')) {
      db.ref('rooms').once('value', snapshot => {
        const rooms = snapshot.val() || {};
        Object.keys(rooms).forEach(roomId => {
          db.ref(`rooms/${roomId}/gameState`).set({ started: false });
        });
      });
      showToast('تم إعادة ضبط اللعبة', 'success');
    }
  };
  
  window.saveGlobalSettings = function() {
    const settings = {
      defaultRounds: +document.getElementById('defRoundsSlider').value,
      defaultThinkTime: +document.getElementById('defThinkSlider').value,
      defaultViewTime: +document.getElementById('defViewSlider').value
    };
    db.ref('settings/global').set(settings);
    showToast('تم حفظ الإعدادات العامة', 'success');
  };
  
  function showToast(message, type) {
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.innerText = message;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
  }
</script>
</body>
</html>
